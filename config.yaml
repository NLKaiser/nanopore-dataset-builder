# Input and Output
input_dir: "./"                                 # Directory containing .fast5 or .pod5 files
output_dir: "output"                            # Where results will be saved
references: "reference_genomes.fa"              # Reference genome for alignment

# Dorado Settings
model: "dna_r10.4.1_e8.2_400bps_sup@v5.2.0"
device: "auto"                                  # "cuda:0" for GPU, "cpu" for CPU

# Segmentation
segment: True                                   # Set to False to skip segmentation
segment_length: 5000                            # Number of signals per segment

# Filtering
min_length: 0                                   # Minimum read length
max_length: 500                                 # Maximum read length. This should always be equal or smaller than "pad_length"
mapq: 20                                        # Minimum mapping quality
identity: 0.90                                  # Minimum mapping quality
max_soft_clip: 4                                # Maximum number of soft clippings
coverage: 0.94                                  # Minimum coverage

# Dataset
pad_length: 500                                 # Maximum number of bases per training entry. The remaining positions are padded with 0.
# Normalisation
shift: 93.69239463939118                        # pA values are normalised: (pA - shift) / scale
scale: 23.506745239082388                       # pA values are normalised: (pA - shift) / scale
